<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5G Handover Optimization Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 30px;
        }
        
        .visualization {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .visualization img {
            width: 100%;
            border-radius: 10px;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .metric {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .metric-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .bs-load {
            margin: 10px 0;
        }
        
        .bs-load-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        
        .progress-bar {
            height: 25px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.85em;
        }
        
        .algorithm-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1em;
            margin-bottom: 15px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .running {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Intelligent 5G Handover Optimization</h1>
            <p>Reinforcement Learning Based Network Management</p>
        </div>
        
        <div class="content">
            <div class="visualization">
                <img id="network-plot" src="" alt="Network Visualization">
            </div>
            
            <div class="controls">
                <div class="card">
                    <h3>⚙️ Simulation Control</h3>
                    <select id="algorithm" class="algorithm-select">
                        <option value="baseline">Baseline (Signal Strength)</option>
                        <option value="dqn">DQN Agent</option>
                        <option value="ppo">PPO Agent</option>
                    </select>
                    <div class="button-group">
                        <button class="btn-primary" onclick="runStep()">▶️ Step</button>
                        <button class="btn-success" onclick="runContinuous()">⏯️ Auto</button>
                        <button class="btn-warning" onclick="stopSimulation()">⏸️ Stop</button>
                        <button class="btn-info" onclick="resetSimulation()">🔄 Reset</button>
                    </div>
                </div>
                
                <div class="card">
                    <h3>📊 Real-time Metrics</h3>
                    <div class="metrics">
                        <div class="metric">
                            <div class="metric-value" id="step-count">0</div>
                            <div class="metric-label">Time Steps</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value" id="handovers">0</div>
                            <div class="metric-label">Handovers</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value" id="ping-pongs">0</div>
                            <div class="metric-label">Ping-Pongs</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value" id="emergency">0</div>
                            <div class="metric-label">Emergency Disc.</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value" id="sinr">0</div>
                            <div class="metric-label">Avg SINR (dB)</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value" id="energy">0</div>
                            <div class="metric-label">Energy</div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <h3>📡 Base Station Load</h3>
                    <div id="bs-loads"></div>
                </div>
                
                <div class="card">
                    <button class="btn-info" onclick="window.location.href='/comparison'" style="width: 100%;">
                        📈 View Comparison Results
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let isRunning = false;
        let intervalId = null;
        
        function updateState() {
            fetch('/get_state')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('network-plot').src = 'data:image/png;base64,' + data.image;
                    document.getElementById('step-count').textContent = data.step;
                    document.getElementById('handovers').textContent = data.handovers;
                    document.getElementById('ping-pongs').textContent = data.ping_pongs;
                    document.getElementById('emergency').textContent = data.emergency_disc;
                    document.getElementById('sinr').textContent = data.avg_sinr;
                    document.getElementById('energy').textContent = data.total_energy;
                    
                    // Update BS loads
                    let bsLoadsHtml = '';
                    data.bs_loads.forEach(bs => {
                        bsLoadsHtml += `
                            <div class="bs-load">
                                <div class="bs-load-label">
                                    <span>BS${bs.id}</span>
                                    <span>${bs.users} users</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${bs.load}%">
                                        ${bs.load.toFixed(0)}%
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    document.getElementById('bs-loads').innerHTML = bsLoadsHtml;
                });
        }
        
        function runStep() {
            const algorithm = document.getElementById('algorithm').value;
            fetch(`/step/${algorithm}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        updateState();
                    }
                });
        }
        
        function runContinuous() {
            if (!isRunning) {
                isRunning = true;
                intervalId = setInterval(runStep, 500);
            }
        }
        
        function stopSimulation() {
            isRunning = false;
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
        }
        
        function resetSimulation() {
            stopSimulation();
            fetch('/reset')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        updateState();
                    }
                });
        }
        
        // Initial load
        updateState();
    </script>
</body>
</html>
